stages:
  - deploy


deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  script:
    - ssh $SSH_USER@$SSH_HOST "
        set -e;
        cd $DEPLOY_PATH;
        
        # Ensure proper SSH setup for pulling from GitHub
        mkdir -p ~/.ssh && chmod 700 ~/.ssh;
        ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null;
        
        eval \$(ssh-agent -s);
        for key in id_rsa id_ed25519 id_ecdsa; do
          if [ -f ~/.ssh/\$key ]; then
            ssh-add ~/.ssh/\$key 2>/dev/null && echo \"Added \$key\";
          fi
        done;

        if [ ! -f .env ]; then
            echo \"CRITICAL: .env file missing in \$PWD\";
        fi

        git fetch origin;
        git checkout main;
        # git reset --hard origin/main; # Optional: force update if there are local changes
        git pull origin main;
        
        make prod-build;
        make prod-up;
      "
  only:
    - main
  environment:
    name: production

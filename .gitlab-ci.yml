stages:
  - deploy


deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  script:
    - ssh $SSH_USER@$SSH_HOST "
        set -e;
        cd $DEPLOY_PATH;
        # Fix directory ownership if it was cloned by a different user
        sudo chown -R \$USER:\$USER .;
        
        # Ensure hosts are known
        mkdir -p ~/.ssh && chmod 700 ~/.ssh;
        ssh-keyscan -H gitlab.com >> ~/.ssh/known_hosts 2>/dev/null;
        ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null;
        
        # Identity setup
        eval \$(ssh-agent -s);
        for key in id_rsa id_ed25519 id_ecdsa; do
          if [ -f ~/.ssh/\$key ]; then
            ssh-add ~/.ssh/\$key 2>/dev/null && echo \"Added \$key\";
          fi
        done;

        git fetch origin;
        git pull origin main;
        make prod-build;
        make prod-up;
      "
  only:
    - main
  environment:
    name: production

name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Ensure proper SSH setup for pulling from GitHub
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
            
            # Use ssh-agent to handle keys if they exist in the deployer's home
            eval $(ssh-agent -s)
            for key in id_rsa id_ed25519 id_ecdsa; do
              if [ -f ~/.ssh/$key ]; then
                ssh-add ~/.ssh/$key 2>/dev/null && echo "Added $key"
              fi
            done
            
            # Check for .env file (critical for docker-compose build/up)
            if [ ! -f .env ]; then
              echo "CRITICAL: .env file missing in $PWD. Build may fail or use development defaults."
            fi
            
            # Update source code
            git fetch origin
            git checkout main
            git pull origin main
            
            # Build and restart containers using Makefile commands
            make prod-build
            make prod-up
